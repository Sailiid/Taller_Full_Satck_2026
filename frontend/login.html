<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Ingreso administrativo para la tienda online Tecnohogar."
    >
    <title>Login administrativo | Digital House</title>
    <link rel="shortcut icon" href="./img/FAVICON_DIGITAL_HOUSE.png" type="image/x-icon">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">
    <!-- Barra de navegacion principal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <div> 
               <img
                 src="./img/LOGO_PRINCIPAL_DIGITAL_HOUSE.png"
                 alt="Logo de Digital House"
                class="navbar-brand img-logo-pg img-fluid d-none d-lg-block p-0 m-0 mx-5" /> 
            </div>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuPrincipal"
                aria-controls="menuPrincipal"
                aria-expanded="false"
                aria-label="Abrir menu de navegacion"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="productos.html">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ayuda.html">Ayuda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <section class="py-5 text-center bg-white">
            <div class="container">
                <h1 class="display-5 fw-bold link-primary font-monospace">Ingreso administrativo</h1>
                <p class="lead mb-0">
                    Ingresa con el correo y la contrasena asignados para administrar los productos de la tienda.
                </p>
            </div>
        </section>

        <section class="container my-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Acceso al panel</h2>

                            <form id="formLogin">
                                <div class="mb-3 text-start">
                                    <label for="correo" class="form-label">Correo electronico</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="correo"
                                        placeholder="admin@tecnohogar.com"
                                        required
                                    >
                                </div>

                                <div class="mb-3 text-start">
                                    <label for="password" class="form-label">Contrasena</label>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Escribe tu contrasena"
                                        required
                                    >
                                </div>

                                <button type="submit" class="btn btn-primary w-100">
                                    Ingresar
                                </button>
                            </form>

                            <div id="mensajeLogin" class="mt-3 text-center" role="alert"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Pie de pagina -->
    <footer class="bg-secondary text-white text-center py-3">
        <div class="container">
            <p class="mb-0">Login administrativo - Digital House 2026</p>
        </div>
    </footer>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
    ></script>
    <script src="js/login.js"></script>
    
</body>
</html>
